id: metrics-phase-4-backfill-metrics
title: Wire numeric metrics into historical backfill
assumptions:
  retire: []
  create:
    - id: historical-backfill-numeric-metrics
      title: Historical backfill numeric metrics
      statement: Codex and Claude historical backfill run the shared numeric
        transcript extractors over parsed JSONL records and merge the resulting
        schema v2 increments into the same date-grouped daily writes as existing
        pattern counters, so historical logs can seed token, tool, timing,
        window, turn, and compaction metrics without storing raw transcript
        content.
      reason: Metrics need reproducible historical data before live hook tailing is
        enabled.
      depends_on:
        - numeric-transcript-extractors
        - backfill-idempotent-writes
        - daily-metrics-log-schema
        - local-aggregate-privacy
  reviewed:
    - id: codex-historical-backfill
      outcome: unchanged
      reason: Codex backfill still parses aggregate pattern/session/tool/runtime
        counters, now with numeric metrics merged alongside them.
    - id: claude-historical-backfill
      outcome: unchanged
      reason: Claude backfill still parses aggregate pattern/session/tool/runtime
        counters, now with numeric metrics merged alongside them.
    - id: numeric-transcript-extractors
      outcome: unchanged
      reason: Backfill consumes extractor output without changing extractor privacy
        semantics.
    - id: backfill-idempotent-writes
      outcome: unchanged
      reason: Existing skip/overwrite behavior and grouped daily writes remain the
        same.
    - id: local-aggregate-privacy
      outcome: unchanged
      reason: Backfilled metric fields are numeric aggregates and safe labels only.
anchors:
