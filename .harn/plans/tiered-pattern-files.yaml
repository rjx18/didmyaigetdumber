id: tiered-pattern-files
title: Split pattern files by two-point tiers
assumptions:
  retire:
    - id: two-scope-pattern-files
      reason: Pattern files now need separate one-point and two-point categories per
        scope instead of one broad file per scope.
    - id: scope-pattern-loader
      reason: The loader must load multiple files per scope and ignore comment lines,
        changing the old non-empty-line contract.
  create:
    - id: tiered-scope-pattern-files
      title: Tiered scope pattern files
      statement: Pattern matching uses `user-1pt.md`, `user-2pt.md`,
        `assistant-1pt.md`, and `assistant-2pt.md` files for each locale, with
        blank lines and lines whose trimmed text starts with `#` ignored, so
        categories can encode the two-tier friction score without YAML, IDs, or
        raw text.
      reason: The monitoring score needs stable one-point and two-point categories
        while keeping pattern files editable plain text.
      depends_on:
        - local-aggregate-privacy
    - id: tiered-pattern-loader
      title: Tiered pattern loader
      statement: Pattern loading maps `user` and `assistant` scopes to all package
        tier files for that scope, compiles non-comment regex lines
        case-insensitively, and reports per-file categories and line counts
        without retaining matched text.
      reason: Hook, backfill, doctor, report, and dashboard flows need one
        privacy-preserving loader that understands tiered pattern files.
      depends_on:
        - tiered-scope-pattern-files
        - local-aggregate-privacy
        - npm-cli-entrypoint
  reviewed:
    - id: npm-cli-entrypoint
      outcome: unchanged
      reason: The CLI command surface stays unchanged; only pattern loading and
        aggregate categories change.
    - id: local-aggregate-privacy
      outcome: unchanged
      reason: The change stores only aggregate counters and line references, never raw
        transcript text.
    - id: daily-aggregate-log-schema
      outcome: unchanged
      reason: Daily logs remain aggregate-only JSON objects, with tiered match keys
        replacing the broad match buckets.
    - id: normalized-event-increments
      outcome: unchanged
      reason: Normalized events still become in-memory aggregate increments, now
        grouped by matched tier category.
    - id: doctor-health-checks
      outcome: unchanged
      reason: Doctor still validates regex compilation through the shared loader.
    - id: codex-live-hook-counting
      outcome: unchanged
      reason: Codex hooks still use the shared pattern and daily-log increment path.
    - id: claude-live-hook-counting
      outcome: unchanged
      reason: Claude hooks still use the shared pattern and daily-log increment path.
    - id: codex-historical-backfill
      outcome: unchanged
      reason: Codex backfill still uses shared pattern matching and aggregate writes.
    - id: claude-historical-backfill
      outcome: unchanged
      reason: Claude backfill still uses shared pattern matching and aggregate writes.
    - id: daily-report-percentages
      outcome: unchanged
      reason: Reports still show aggregate user, assistant, and total rates by rolling
        up tiered categories.
    - id: backfill-idempotent-writes
      outcome: unchanged
      reason: Shared backfill writes still merge aggregate increments by date with the
        same skip and overwrite behavior.
    - id: local-dashboard-server
      outcome: unchanged
      reason: The dashboard API remains aggregate-only and keeps the same public
        response shape.
    - id: aggregate-only-safety-checks
      outcome: unchanged
      reason: The privacy allowlist remains aggregate-only.
    - id: interactive-install-onboarding
      outcome: unchanged
      reason: Installer backfill behavior remains unchanged apart from tiered counters.
    - id: end-to-end-verification
      outcome: unchanged
      reason: The full simulated workflow still verifies aggregate-only telemetry.
