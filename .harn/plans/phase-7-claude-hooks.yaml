      title: Claude Code live hook counting
      statement: Claude Code live hook payloads are normalized from hook event names
        and counted through the shared pattern and daily-log increment path, so
        user prompts, visible assistant messages, tools, permissions, and
        runtime failures update aggregate logs without live transcript parsing.
