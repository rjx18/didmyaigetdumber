id: exclude-self-and-fix-noisy-patterns
title: Exclude own sessions from backfill and fix noisy user patterns
assumptions:
  retire: []
  create:
    - id: backfill-excludes-self-sessions
      title: Backfill excludes didmyaigetdumber's own sessions
      statement: Historical backfill skips Codex sessions whose `session_meta` cwd
        matches the didmyaigetdumber repo and Claude sessions whose transcript
        path matches it, so the tool's own development conversations do not bias
        friction trend metrics; the exclusion is overridable through an
        `excludeProject` option.
      reason: Pattern-design discussion in this repo's own transcripts matches the
        friction patterns and skews the already sparse assistant signal.
      depends_on:
        - codex-historical-backfill
        - claude-historical-backfill
  reviewed:
    - id: two-scope-pattern-files
      outcome: unchanged
      reason: User pattern edits keep the two-file, one-regex-per-line layout.
    - id: scope-pattern-loader
      outcome: unchanged
      reason: Refined revert and regression regexes still compile case-insensitively
        and stay RE2-safe.
    - id: local-aggregate-privacy
      outcome: unchanged
      reason: Exclusion only skips whole files; no raw transcript fields are stored.
