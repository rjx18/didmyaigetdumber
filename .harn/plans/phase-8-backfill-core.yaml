id: phase-8-backfill-core
title: Add shared backfill write behavior
assumptions:
  retire: []
  create:
    - id: backfill-idempotent-writes
      title: Backfill idempotent writes
      statement: Backfill writes grouped daily aggregates by creating missing daily
        files and skipping existing dates unless `--overwrite` is explicitly
        set, so repeated backfills do not double-count historical logs.
      reason: Historical import reads past transcripts without per-session import
        state, so default additive writes would not be safe to rerun.
      depends_on:
        - daily-aggregate-log-schema
        - daily-log-locking
        - local-aggregate-privacy
  reviewed:
    - id: daily-aggregate-log-schema
      outcome: unchanged
      reason: Phase 8 writes the existing daily schema from aggregate increments.
    - id: daily-log-locking
      outcome: unchanged
      reason: Phase 8 uses the locked daily write path.
    - id: local-aggregate-privacy
      outcome: unchanged
      reason: Phase 8 stores aggregate counters only.
