id: metrics-v3-phase-b4-live-tail
title: Reconcile date-scoped live hooks and transcript tailing
assumptions:
  retire:
    - id: live-hook-numeric-tail-integration
      reason: Live tailing now writes date-scoped schema v3 increments and
        participates in an explicit ownership split with direct hooks.
    - id: codex-live-hook-counting
      reason: SessionStart becomes ensure-only and Codex direct hook counting is
        reconciled with transcript-derived metrics.
    - id: claude-live-hook-counting
      reason: SessionStart becomes ensure-only and Claude direct hook counting is
        reconciled with transcript-derived metrics.
    - id: metrics-end-to-end-verification
      reason: End-to-end verification must cover schema v3 date-scoped backfill/live
        parity.
  create:
    - id: live-attribution-reconciliation
      title: Live attribution reconciliation
      statement: Direct Codex and Claude hooks own immediate global friction,
        tool-total, permission, and runtime counters while SessionStart only
        ensures the daily log exists, and low-frequency transcript tails write
        date-scoped numeric, tool-detail, timing, window, and per-model
        increments without re-adding direct-hook-owned root counters, so live
        collection remains non-blocking and avoids double counting.
      reason: Live schema v3 data needs explicit producer ownership, cross-midnight
        writes, and truthful per-model attribution.
      depends_on:
        - date-scoped-transcript-metrics
        - turn-model-attribution
        - transcript-offset-tail-store
        - daily-log-locking
        - numeric-transcript-tail-privacy
    - id: metrics-v3-end-to-end-verification
      title: Metrics v3 end-to-end verification
      statement: The test suite compares schema v3 historical backfill and date-scoped
        live transcript tailing over the same sanitized records, verifies
        repeated tails and cross-midnight writes, and confirms logs and APIs
        omit raw transcript content.
      reason: The producer ownership split and date-scoped writes require end-to-end
        regression coverage.
      depends_on:
        - historical-per-model-backfill
        - live-attribution-reconciliation
        - local-metrics-api
        - aggregate-only-safety-checks
  reviewed:
    - id: transcript-offset-tail-store
      outcome: unchanged
      reason: Existing offsets prevent repeated tail records from being ingested twice.
    - id: normalized-event-increments
      outcome: unchanged
      reason: Non-SessionStart direct hooks still use normalized aggregate increments.
    - id: codex-historical-backfill
      outcome: unchanged
      reason: Codex historical behavior remains covered by the replacement v3
        verification contract.
    - id: claude-historical-backfill
      outcome: unchanged
      reason: Claude historical behavior remains covered by the replacement v3
        verification contract.
    - id: doctor-health-checks
      outcome: unchanged
      reason: Installed hook health checks are unchanged.
    - id: end-to-end-verification
      outcome: unchanged
      reason: The broader workflow verification remains valid.
    - id: interactive-install-onboarding
      outcome: unchanged
      reason: Hook installation remains unchanged.
