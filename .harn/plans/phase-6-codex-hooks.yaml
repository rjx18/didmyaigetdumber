id: phase-6-codex-hooks
title: Add Codex live hook adapter
assumptions:
  retire: []
  create:
    - id: codex-live-hook-counting
      title: Codex live hook counting
      statement: Codex live hook payloads are normalized defensively and counted
        through the shared pattern and daily-log increment path, so user
        messages, tools, permissions, sessions, and runtime interrupts update
        aggregate logs without transcript parsing.
      reason: Codex support is a core v1 integration and must share privacy-preserving
        storage behavior with other sources.
      depends_on:
        - normalized-event-increments
        - daily-log-locking
        - scope-pattern-loader
        - npm-cli-entrypoint
  reviewed:
    - id: normalized-event-increments
      outcome: unchanged
      reason: Phase 6 consumes the normalized increment model.
    - id: daily-log-locking
      outcome: unchanged
      reason: Phase 6 uses the locked daily update path.
    - id: scope-pattern-loader
      outcome: unchanged
      reason: Phase 6 uses scope pattern matching without changing patterns.
    - id: local-aggregate-privacy
      outcome: unchanged
      reason: Phase 6 does not store raw hook payload text.
anchors:
