title: Aggregate-only safety checks
state: active
statement: Daily log normalization and public telemetry surfaces reject or omit
  unrecognized raw-content fields while preserving aggregate totals, matches,
  and percentages, so accidental transcript, path, command, or secret fields are
  not persisted or served.
