id: ui-rate-limit-window-cards
hash: a-e59e0cf9b49e
title: UI rate-limit cards lead with reset time and usage
state: active
statement: Each rate-limit window card from `/api/ui` `limits` leads with the
  time until the window resets (`timeToResetHrs`) and the used percent (with a
  usage bar), both always shown; time-to-exhaustion appears only as a
  conditional status line — a warning when `percentTimeToExhaustHrs` is non-null
  and less than `timeToResetHrs` ("on pace to exhaust before reset"), otherwise
  a reassuring "resets before exhaustion" line, and "burn unknown" when there is
  no burn estimate; burn rate and rolling allowance stay as secondary rows and
  the windows remain account-wide.
depends_on:
  - ui-live-data-binding
  - rate-limit-local-estimates
created_by: frontend-r3-rate-limit-redesign
