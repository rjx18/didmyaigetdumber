title: Local dashboard server
state: active
statement: The start command runs a localhost HTTP server that serves an
  aggregate-only `/api/days` endpoint and a compact browser dashboard with
  per-day total, user, and assistant pattern percentages, so users can inspect
  trends without uploading telemetry or exposing raw transcript data.
