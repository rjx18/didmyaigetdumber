id: backfill-excludes-self-sessions
hash: a-dabcf9e1ff1c
title: Backfill excludes didmyaigetdumber's own sessions
state: active
statement: Historical backfill skips Codex sessions whose `session_meta` cwd
  matches the didmyaigetdumber repo and Claude sessions whose transcript path
  matches it, so the tool's own development conversations do not bias friction
  trend metrics; the exclusion is overridable through an `excludeProject`
  option.
