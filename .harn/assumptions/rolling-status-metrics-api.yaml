title: Rolling status metrics API
state: active
statement: The GET /api/ui endpoint returns an aggregate-only versioned payload
  with calendar-aligned all-model and per-model series, account-scoped fields,
  model attribution coverage, current-versus-prior 14-calendar-day rolling
  metrics and status, and corrected global rate-limit estimates, while
  preserving temporary root aliases for the existing frontend.
