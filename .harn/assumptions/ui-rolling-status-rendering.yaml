id: ui-rolling-status-rendering
hash: a-ff7d60ff0686
title: UI renders server-computed status and rolling KPIs
state: active
statement: The dashboard's system-status verdict and headline-KPI values and
  deltas are read from the server-computed `/api/ui` `all.status` and
  `all.rolling` (14-day current-vs-previous windows), not recomputed client-side
  from the raw daily series; the status hero renders the
  `healthy`/`degraded`/`insufficient-data` verdict from `status.signals`,
  derives its narrative from the degraded signals and the friction rolling
  trend, and shows the real loaded date range instead of hardcoded copy.
depends_on:
  - ui-live-data-binding
  - rolling-status-metrics-api
created_by: frontend-fe-b-rolling-status
